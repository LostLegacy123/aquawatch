# Daily news scrape — manual or cron-job.org dispatch only (no GitHub schedule).
# Disable the cron-job.org job to stop automatic scrapes.

name: Daily News Scraper (9AM PHT)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: scraper
      - name: Scrape all sources
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
        working-directory: scraper
