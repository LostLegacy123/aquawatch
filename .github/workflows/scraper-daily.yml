# Daily news scrape + group digest (9AM PHT window) — cron-job.org or manual dispatch.

name: Daily News Scraper (9AM PHT)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: scraper
      - name: Scrape all sources
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
        working-directory: scraper
      - run: npm install
        working-directory: scripts
      - name: Send daily digest to Telegram / Discord group
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          DISCORD_GROUP_WEBHOOK: ${{ secrets.DISCORD_GROUP_WEBHOOK }}
        run: node sendDailyDigest.js
        working-directory: scripts
