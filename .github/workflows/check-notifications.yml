# Runs every 5 minutes (cron) and can still be triggered manually.

name: Notification Checker (every 5 min)

on:
  workflow_dispatch:
  schedule:
    # Offset from :00/:05 to avoid GitHub scheduler drops at the top of each hour
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: cd scripts && npm install
      - name: Run notification checker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/checkNotifications.js
