# Schedules are DISABLED until you enable them (see README.md).
# Safe to commit and push: this workflow only runs when triggered manually from GitHub Actions.

name: Notification Checker (every 5 min)

on:
  # workflow_dispatch:
  # Enable automatic runs when Firebase + secrets are ready:
   schedule:
     - cron: '*/5 * * * *'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: cd scripts && npm install
      - name: Run notification checker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/checkNotifications.js
