<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaWatch PH</title>
    <link rel="icon" type="image/svg+xml" href="https://phone-5538a.web.app/favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0f1e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.6;
    }
    .wrap {
      max-width: 36rem;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      margin-bottom: 0.5rem;
      color: #00d4ff;
      font-weight: 700;
    }
    .tagline {
      font-size: clamp(1rem, 3vw, 1.125rem);
      color: #94a3b8;
      margin-bottom: 1.5rem;
      max-width: 32rem;
      margin-left: auto;
      margin-right: auto;
    }
    .badge {
      display: inline-block;
      background: rgba(0, 212, 255, 0.12);
      border: 1px solid rgba(0, 212, 255, 0.35);
      color: #00d4ff;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    @media (min-width: 480px) {
      .actions {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn { flex: 1 1 calc(50% - 0.5rem); min-width: 10rem; max-width: 17rem; }
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      text-decoration: none;
      text-align: center;
      color: #0a0f1e;
      background: #00d4ff;
      border: 2px solid #00d4ff;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .btn:hover {
      background: transparent;
      color: #00d4ff;
    }
    .btn:focus-visible {
      outline: 2px solid #00d4ff;
      outline-offset: 3px;
    }
    .updated {
      font-size: 0.8125rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AquaWatch PH</h1>
    <p class="tagline">Automated water &amp; wind news aggregator and smart notification system for the Philippines</p>
    <p class="badge">🟢 System Operational</p>

    <nav class="actions" aria-label="Quick links">
      <a class="btn" href="https://phone-5538a.web.app">Open Dashboard</a>
      <a class="btn" href="https://github.com/LostLegacy123/aquawatch">GitHub Repo</a>
      <a class="btn" href="https://t.me/aquawatchph_bot">Link Telegram Bot</a>
      <a class="btn" href="https://discord.gg/BuRxMPxH6">Join Discord</a>
    </nav>

    <p class="updated">Last updated: May 17, 2026</p>
  </div>
</body>
</html>
